name: Packaging

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  deb:
    name: Build .deb (Debian/Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev
          python -m pip install --upgrade pip build

      - name: Build .deb
        run: bash packaging/scripts/build-deb.sh

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: packaging/build/*.deb
          if-no-files-found: error

  rpm:
    name: Build .rpm (Fedora)
    runs-on: ubuntu-latest
    container:
      image: fedora:40
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y rpm-build python3 python3-pip git
          python3 -m pip install --upgrade pip build tomli

      - uses: actions/checkout@v4

      - name: Build .rpm
        run: bash packaging/scripts/build-rpm.sh

      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: packaging/build/rpm/RPMS/**/*.rpm
          if-no-files-found: error

  arch:
    name: Build Arch package (PKGBUILD)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --user root
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel python python-pip python-build git sudo
          # makepkg refuses to run as root; create a builder user.
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

      - uses: actions/checkout@v4

      - name: Fix ownership for makepkg
        run: chown -R builder:builder .

      - name: Build Arch package
        run: sudo -u builder bash packaging/scripts/build-arch.sh

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: packaging/build/arch/*.pkg.tar.*
          if-no-files-found: warn
